<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple AI Chat</title>
    <style>
      :root {
        --bg-top: #e8f0ff;
        --bg-bottom: #f7f9fc;
        --panel: rgba(255, 255, 255, 0.92);
        --panel-strong: #ffffff;
        --line: #d3dceb;
        --text: #152033;
        --muted: #64748b;
        --accent: #1a73e8;
        --accent-strong: #0b5cd6;
        --bubble-user: #eaf2ff;
        --bubble-ai: #f4f6f9;
        --shadow: 0 18px 40px rgba(19, 38, 77, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(26, 115, 232, 0.12), transparent 32%),
          linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
        color: var(--text);
      }

      .shell {
        width: min(920px, 100%);
        margin: 0 auto;
        padding: 24px;
      }

      .frame {
        overflow: hidden;
        border: 1px solid rgba(211, 220, 235, 0.9);
        border-radius: 26px;
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      .hero {
        padding: 26px 28px 20px;
        border-bottom: 1px solid var(--line);
        background:
          linear-gradient(135deg, rgba(26, 115, 232, 0.09), rgba(255, 255, 255, 0.7)),
          var(--panel-strong);
      }

      .eyebrow {
        display: inline-block;
        margin-bottom: 10px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(26, 115, 232, 0.1);
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 40px);
        line-height: 1.02;
      }

      .hero p {
        max-width: 640px;
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.5;
      }

      .settings {
        display: grid;
        grid-template-columns: 1.4fr 0.8fr auto auto;
        gap: 12px;
        padding: 18px 28px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.64);
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .field label {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--muted);
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.98);
        color: var(--text);
        font: inherit;
      }

      input {
        min-height: 46px;
        padding: 0 14px;
      }

      textarea {
        min-height: 74px;
        padding: 14px 16px;
        resize: vertical;
      }

      .button-stack {
        display: flex;
        align-items: end;
        gap: 10px;
      }

      button {
        min-height: 46px;
        padding: 0 18px;
        border: 0;
        border-radius: 14px;
        background: var(--accent);
        color: white;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        transition: transform 140ms ease, background 140ms ease, opacity 140ms ease;
      }

      button:hover {
        background: var(--accent-strong);
        transform: translateY(-1px);
      }

      button.secondary {
        background: #dde7f8;
        color: #1a3763;
      }

      button.secondary:hover {
        background: #cedcf5;
      }

      button:disabled {
        opacity: 0.58;
        cursor: wait;
        transform: none;
      }

      .remember {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 28px 18px;
        color: var(--muted);
        font-size: 13px;
      }

      .remember input {
        width: 16px;
        min-height: 16px;
        padding: 0;
      }

      .messages {
        height: 430px;
        overflow-y: auto;
        padding: 22px 28px 10px;
      }

      .empty-state {
        margin: 8px 0 18px;
        padding: 16px 18px;
        border: 1px dashed var(--line);
        border-radius: 18px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.75);
        line-height: 1.5;
      }

      .message {
        max-width: min(78%, 700px);
        margin-bottom: 14px;
        padding: 14px 16px;
        border-radius: 18px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-wrap: break-word;
      }

      .message.user {
        margin-left: auto;
        border-bottom-right-radius: 6px;
        background: var(--bubble-user);
      }

      .message.assistant {
        border-bottom-left-radius: 6px;
        background: var(--bubble-ai);
      }

      .composer {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        padding: 8px 28px 28px;
      }

      .status {
        padding: 0 28px 18px;
        color: var(--muted);
        font-size: 13px;
      }

      code.inline {
        padding: 2px 6px;
        border-radius: 8px;
        background: rgba(26, 115, 232, 0.09);
        color: #1b4c9d;
      }

      @media (max-width: 760px) {
        .shell {
          padding: 12px;
        }

        .settings,
        .composer {
          grid-template-columns: 1fr;
        }

        .button-stack {
          align-items: stretch;
          flex-direction: column;
        }

        .messages {
          height: 52vh;
          padding-left: 18px;
          padding-right: 18px;
        }

        .hero,
        .settings,
        .remember,
        .composer,
        .status {
          padding-left: 18px;
          padding-right: 18px;
        }

        .message {
          max-width: 92%;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="frame">
        <header class="hero">
          <span class="eyebrow">Embedded Chat</span>
          <h1>Simple AI website for Google Sites</h1>
          <p>
            Paste your Gemini API key, ask questions, and embed this page into Google Sites after
            GitHub Pages is turned on.
          </p>
        </header>

        <section class="settings">
          <div class="field">
            <label for="apiKey">Gemini API key</label>
            <input id="apiKey" type="password" placeholder="Paste your Gemini key here">
          </div>
          <div class="field">
            <label for="model">Model</label>
            <input id="model" type="text" value="gemini-2.5-flash">
          </div>
          <div class="button-stack">
            <button id="saveKey" class="secondary" type="button">Save key</button>
          </div>
          <div class="button-stack">
            <button id="clearChat" class="secondary" type="button">Clear chat</button>
            <button id="forgetKey" class="secondary" type="button">Forget key</button>
          </div>
        </section>

        <label class="remember">
          <input id="rememberKey" type="checkbox">
          Remember the key in this browser only. Avoid this on shared computers.
        </label>

        <section id="messages" class="messages">
          <div id="emptyState" class="empty-state">
            Try prompts like:
            <br>
            <code class="inline">solve 2x + 7 = 25</code>
            <br>
            <code class="inline">rewrite this paragraph better</code>
            <br>
            <code class="inline">help me study photosynthesis</code>
          </div>
        </section>

        <section class="composer">
          <textarea id="prompt" placeholder="Ask anything you want help with. Press Enter to send. Shift+Enter adds a new line."></textarea>
          <button id="sendButton" type="button">Send</button>
        </section>

        <div id="status" class="status">Ready.</div>
      </section>
    </main>

    <script>
      const API_URL_BASE = 'https://generativelanguage.googleapis.com/v1beta/models/';
      const STORAGE_KEY = 'simple-ai-chat-gemini-key';
      const messages = [];

      const apiKeyInput = document.getElementById('apiKey');
      const modelInput = document.getElementById('model');
      const rememberKeyInput = document.getElementById('rememberKey');
      const saveKeyButton = document.getElementById('saveKey');
      const forgetKeyButton = document.getElementById('forgetKey');
      const clearChatButton = document.getElementById('clearChat');
      const sendButton = document.getElementById('sendButton');
      const promptInput = document.getElementById('prompt');
      const messagesEl = document.getElementById('messages');
      const emptyStateEl = document.getElementById('emptyState');
      const statusEl = document.getElementById('status');

      function readSavedKey() {
        try {
          return window.localStorage.getItem(STORAGE_KEY) || '';
        } catch (error) {
          return '';
        }
      }

      function saveKeyLocally() {
        if (!rememberKeyInput.checked) {
          setStatus('Turn on "Remember" before saving a key.');
          return;
        }

        try {
          window.localStorage.setItem(STORAGE_KEY, apiKeyInput.value.trim());
          setStatus('Key saved in this browser.');
        } catch (error) {
          setStatus('This browser blocked local storage. The key will only stay for this tab.');
        }
      }

      function forgetSavedKey() {
        try {
          window.localStorage.removeItem(STORAGE_KEY);
        } catch (error) {
          // Ignore storage cleanup failures and still clear the visible state.
        }
        apiKeyInput.value = '';
        rememberKeyInput.checked = false;
        setStatus('Saved key removed from this browser.');
        apiKeyInput.focus();
      }

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function setBusy(isBusy) {
        sendButton.disabled = isBusy;
        clearChatButton.disabled = isBusy;
        saveKeyButton.disabled = isBusy;
        forgetKeyButton.disabled = isBusy;
        apiKeyInput.disabled = isBusy;
        modelInput.disabled = isBusy;
        promptInput.disabled = isBusy;
        setStatus(isBusy ? 'Thinking...' : 'Ready.');
      }

      function renderMessage(role, text) {
        if (emptyStateEl) {
          emptyStateEl.remove();
        }

        const element = document.createElement('div');
        element.className = 'message ' + role;
        element.textContent = text;
        messagesEl.appendChild(element);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function toGeminiContents(history) {
        return history.map((message) => ({
          role: message.role === 'user' ? 'user' : 'model',
          parts: [{ text: message.content }],
        }));
      }

      function readGeminiText(payload) {
        const candidates = payload.candidates || [];
        for (const candidate of candidates) {
          const parts = ((candidate || {}).content || {}).parts || [];
          const text = parts
            .map((part) => part && part.text ? part.text : '')
            .filter(Boolean)
            .join('\n')
            .trim();
          if (text) {
            return text;
          }
        }

        const blockReason = ((payload.promptFeedback || {}).blockReason || '').trim();
        if (blockReason) {
          return 'Request blocked by Gemini: ' + blockReason;
        }

        return 'Gemini returned no text.';
      }

      async function sendMessage() {
        const apiKey = apiKeyInput.value.trim();
        const prompt = promptInput.value.trim();
        const model = modelInput.value.trim() || 'gemini-2.5-flash';

        if (!apiKey) {
          setStatus('Paste your Gemini API key first.');
          apiKeyInput.focus();
          return;
        }

        if (!prompt) {
          return;
        }

        const userMessage = { role: 'user', content: prompt };
        messages.push(userMessage);
        renderMessage('user', prompt);
        promptInput.value = '';
        setBusy(true);

        try {
          const response = await fetch(API_URL_BASE + encodeURIComponent(model) + ':generateContent', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-goog-api-key': apiKey,
            },
            body: JSON.stringify({
              contents: toGeminiContents(messages),
              generationConfig: { temperature: 0.3 },
            }),
          });

          const payload = await response.json();
          if (!response.ok) {
            const detail = payload.error && payload.error.message ? payload.error.message : JSON.stringify(payload);
            throw new Error(detail);
          }

          const reply = readGeminiText(payload);
          messages.push({ role: 'assistant', content: reply });
          renderMessage('assistant', reply);
        } catch (error) {
          const text = error && error.message ? error.message : String(error);
          renderMessage('assistant', 'Error: ' + text);
        } finally {
          setBusy(false);
          promptInput.focus();
        }
      }

      apiKeyInput.value = readSavedKey();
      rememberKeyInput.checked = Boolean(apiKeyInput.value);
      if (apiKeyInput.value) {
        setStatus('Saved Gemini key loaded from this browser.');
      }

      saveKeyButton.addEventListener('click', saveKeyLocally);
      forgetKeyButton.addEventListener('click', forgetSavedKey);
      clearChatButton.addEventListener('click', () => {
        messages.length = 0;
        messagesEl.innerHTML = '';
        messagesEl.appendChild(emptyStateEl);
        setStatus('Chat cleared.');
        promptInput.focus();
      });
      rememberKeyInput.addEventListener('change', () => {
        if (rememberKeyInput.checked) {
          saveKeyLocally();
        } else {
          forgetSavedKey();
        }
      });
      apiKeyInput.addEventListener('input', () => {
        if (rememberKeyInput.checked) {
          saveKeyLocally();
        }
      });
      sendButton.addEventListener('click', sendMessage);
      promptInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });
    </script>
  </body>
</html>
